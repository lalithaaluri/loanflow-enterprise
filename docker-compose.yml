services:
  postgres:
    image: postgres:17
    container_name: loanflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - loanflow-postgres-data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: loanflow-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./loanflow-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: loanflow-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  loanflow-postgres-data: